<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NCI Content Manager - Nature Coast Indivisible</title>
    <link rel="icon" href="/images/logo-fallback.svg" type="image/svg+xml" />
    <link href="config.yml" type="text/yaml" rel="cms-config-url" />
    <style>
      .nci-range-widget {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        width: 100%;
      }

      .nci-range-widget input[type="range"] {
        flex: 1;
        accent-color: #1f4b99;
        cursor: pointer;
      }

      .nci-range-widget__value {
        min-width: 3rem;
        font-variant-numeric: tabular-nums;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <script>
      window.CMS_MANUAL_INIT = true;

      const NETLIFY_IDENTITY_API_URL =
        "https://kaleidoscopic-travesseiro-5199a3.netlify.app/.netlify/identity";
      const NETLIFY_SITE_URL = "https://kaleidoscopic-travesseiro-5199a3.netlify.app";

      try {
        localStorage.setItem("netlifySiteURL", NETLIFY_SITE_URL);
      } catch (error) {
        /* ignore storage errors */
      }
    </script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
      (function () {
        const identity = window.netlifyIdentity;
        if (!identity) return;

        const realInit = identity.init.bind(identity);
        let configured = false;

        identity.init = function (opts) {
          const hasOptions = opts && Object.keys(opts).length > 0;
          if (configured && !hasOptions) return;
          configured = true;
          return realInit({
            ...(opts || {}),
            APIUrl: (opts && opts.APIUrl) || NETLIFY_IDENTITY_API_URL
          });
        };

        identity.on("init", () => {
          loadDecapCms();

          identity.on("login", () => {
            if (window.location.pathname.replace(/\/$/, "") !== "/admin") {
              document.location.href = "/admin/";
            }
          });
        });

        identity.init({ APIUrl: NETLIFY_IDENTITY_API_URL });
      })();

      function registerCmsExtensions(cms) {
        if (cms.__nciExtensionsRegistered) return;

        const h = window.h;
        const createClass = window.createClass;

        if (h && createClass) {
          const RangeControl = createClass({
            handleChange(event) {
              this.props.onChange(Number(event.target.value));
            },

            render() {
              const { value, forID, field } = this.props;
              const min = field.get("min", 10);
              const max = field.get("max", 100);
              const step = field.get("step", 1);
              const defaultValue = field.get("default", 44);
              const currentValue = value ?? defaultValue;

              return h("div", { className: "nci-range-widget" }, [
                h("input", {
                  id: forID,
                  type: "range",
                  min: String(min),
                  max: String(max),
                  step: String(step),
                  value: String(currentValue),
                  onChange: this.handleChange
                }),
                h("span", { className: "nci-range-widget__value" }, `${currentValue}%`)
              ]);
            }
          });

          cms.registerWidget("range", RangeControl);
        }

        cms.registerEditorComponent({
          id: "button",
          label: "Button",
          fields: [
            { name: "text", label: "Button Text", widget: "string" },
            { name: "href", label: "Link", widget: "string" },
            {
              name: "style",
              label: "Button Style",
              widget: "select",
              options: [
                { label: "Yellow", value: "button--yellow" },
                { label: "Light Blue", value: "button--blue" },
                { label: "Dark Blue", value: "button--dark-blue" }
              ],
              default: "button--yellow"
            },
            {
              name: "newTab",
              label: "Open in new tab",
              widget: "boolean",
              default: false,
              required: false
            }
          ],
          pattern:
            /<a class="button (button--yellow|button--blue|button--dark-blue)" href="([^"]+)"(?: target="_blank" rel="noopener noreferrer")?>([^<]+)<\/a>/,
          fromBlock: (match) => ({
            style: match[1],
            href: match[2],
            text: match[3],
            newTab: match[0].includes('target="_blank"')
          }),
          toBlock: ({ text, href, style, newTab }) => {
            const target = newTab ? ' target="_blank" rel="noopener noreferrer"' : "";
            return `<a class="button ${style}" href="${href}"${target}>${text}</a>`;
          },
          toPreview: ({ text, href, style }) =>
            `<a class="button ${style}" href="${href}">${text}</a>`
        });

        cms.registerEditorComponent({
          id: "youtube",
          label: "YouTube",
          fields: [
            { name: "url", label: "YouTube Link", widget: "string" },
            { name: "title", label: "Embed Title (accessibility)", widget: "string", required: false }
          ],
          pattern: /<iframe[^>]*src="https:\/\/www\.youtube\.com\/embed\/([^"?]+)[^"]*"[^>]*title="([^"]*)"[^>]*><\/iframe>/,
          fromBlock: (match) => ({
            url: `https://www.youtube.com/watch?v=${match[1]}`,
            title: match[2] || "YouTube video"
          }),
          toBlock: ({ url, title }) => {
            const getVideoId = (value) => {
              try {
                const parsed = new URL(value);
                if (parsed.hostname.includes("youtu.be")) return parsed.pathname.replace("/", "");
                if (parsed.searchParams.get("v")) return parsed.searchParams.get("v");
                const match = parsed.pathname.match(/\/embed\/([^/]+)/);
                return match ? match[1] : "";
              } catch {
                const fallback = value.match(/(?:v=|youtu\.be\/)([A-Za-z0-9_-]{6,})/);
                return fallback ? fallback[1] : "";
              }
            };
            const id = getVideoId(url);
            const safeTitle = title || "YouTube video";
            return `<iframe width="560" height="315" src="https://www.youtube.com/embed/${id}" title="${safeTitle}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`;
          },
          toPreview: ({ url }) => {
            const safe = url || "";
            return `<p>YouTube Embed: ${safe}</p>`;
          }
        });

        cms.__nciExtensionsRegistered = true;
      }

      function initDecapCms() {
        const cms = window.CMS;
        if (!cms || cms.__nciInitialized) return;

        registerCmsExtensions(cms);
        cms.init();
        cms.__nciInitialized = true;
      }

      function loadDecapCms() {
        if (window.CMS) {
          initDecapCms();
          return;
        }

        if (document.getElementById("decap-cms-script")) return;

        const script = document.createElement("script");
        script.id = "decap-cms-script";
        script.src = "https://unpkg.com/decap-cms@3.6.0/dist/decap-cms.js";
        script.onload = initDecapCms;
        document.body.appendChild(script);
      }
    </script>
    <script>
      const MAX_UPLOAD_BYTES = 2 * 1024 * 1024;

      document.addEventListener("change", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLInputElement)) return;
        if (target.type !== "file" || !target.files?.length) return;

        const oversized = Array.from(target.files).filter((file) => file.size > MAX_UPLOAD_BYTES);
        if (!oversized.length) return;

        alert(
          "One or more files exceed the 2MB limit. Please compress the image and try again."
        );
        target.value = "";
      });
    </script>
  </body>
</html>

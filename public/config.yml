backend:
  name: git-gateway
  branch: main
  identity_url: https://kaleidoscopic-travesseiro-5199a3.netlify.app/.netlify/identity
  gateway_url: https://kaleidoscopic-travesseiro-5199a3.netlify.app/.netlify/git

# Used by `npm run cms` for local editing without Netlify login.
local_backend: true

site_url: https://naturecoastindivisible.org
display_url: https://naturecoastindivisible.org

media_folder: "public/uploads"
public_folder: "/uploads"

logo:
  src: /images/NCI-logo-dark.svg

collections:
  - name: "homepage"
    label: "Homepage"
    files:
      - name: "home"
        label: "Homepage Content"
        file: "src/content/homePage/home.md"
        fields:
          - label: "Hero Image"
            name: "heroImage"
            widget: "image"
            choose_url: true
            hint: "Upload directly, pick from the media library, or paste an external image URL."
          - { label: "Hero Image Alt", name: "heroImageAlt", widget: "string", required: false }
          - label: "Hero Image Brightness"
            name: "heroBrightness"
            widget: "range"
            min: 10
            max: 100
            step: 1
            default: 44
            hint: "Drag left for a darker hero, right for a brighter hero. 44 is the current site default."
          - { label: "About Heading", name: "aboutHeading", widget: "string" }
          - { label: "Events Heading", name: "eventsHeading", widget: "string", required: false }
          - { label: "Action Items Heading", name: "actionItemsHeading", widget: "string", required: false }
          - { label: "About Body", name: "body", widget: "markdown", hint: "Use Add Component for Button or YouTube." }

  - name: "homeAboutSlides"
    label: "Homepage About Slides"
    folder: "src/content/homeAboutSlides"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Order", name: "order", widget: "number", value_type: "int", min: 0 }
      - label: "Image"
        name: "image"
        widget: "image"
        choose_url: true
        hint: "Upload directly, pick from the media library, or paste an external image URL."
      - { label: "Image Alt", name: "imageAlt", widget: "string", required: false }

  - name: "aboutPage"
    label: "About Us"
    files:
      - name: "about"
        label: "About Us Page"
        file: "src/content/aboutPage/about.md"
        fields:
          - { label: "Body", name: "body", widget: "markdown", hint: "Use Add Component for Button or YouTube." }

  - name: "missionStatement"
    label: "Mission Statement"
    files:
      - name: "mission-statement"
        label: "Mission Statement Page"
        file: "src/content/missionStatement/mission-statement.md"
        fields:
          - { label: "Body", name: "body", widget: "markdown", hint: "Use Add Component for Button or YouTube." }

  - name: "leadership"
    label: "Leadership"
    folder: "src/content/leadership"
    create: true
    identifier_field: name
    slug: "{{slug}}"
    fields:
      - { label: "Order", name: "order", widget: "number", value_type: "int", min: 1, default: 1, required: false, hint: "Optional. Defaults to 1 (first). Use 2, 3, etc. to sort later items." }
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Role", name: "role", widget: "string" }

  - name: "immediateAction"
    label: "Immediate Action"
    folder: "src/content/immediateAction"
    create: true
    identifier_field: headline
    slug: "{{slug}}"
    fields:
      - label: "Priority"
        name: "priority"
        widget: "select"
        default: "regular"
        options:
          - { label: "Regular Priority", value: "regular" }
          - { label: "High Priority", value: "high" }
      - { label: "Order", name: "order", widget: "number", value_type: "int", min: 1, default: 1, required: false, hint: "Optional. Defaults to 1 (first). Use 2, 3, etc. to sort later items." }
      - { label: "Headline", name: "headline", widget: "string", hint: "Controls the URL, e.g. /action-items/my-headline/. Changing this headline updates the page URL." }
      - { label: "Subheading", name: "subheading", widget: "string" }
      - label: "Display Image"
        name: "avatarImage"
        widget: "image"
        required: false
        choose_url: true
        hint: "Upload directly, pick from the media library, or paste an external image URL."
      - { label: "Display Image Description", name: "avatarAlt", widget: "string", required: false, hint: "Short accessibility description of the cover image (not the file path)." }
      - { label: "Body", name: "body", widget: "markdown", hint: "Use Add Component for Button or YouTube." }

  - name: "ongoingAction"
    label: "Ongoing Action"
    folder: "src/content/ongoingAction"
    create: true
    identifier_field: headline
    slug: "{{slug}}"
    fields:
      - { label: "Order", name: "order", widget: "number", value_type: "int", min: 1, default: 1, required: false, hint: "Optional. Defaults to 1 (first). Use 2, 3, etc. to sort later items." }
      - { label: "Headline", name: "headline", widget: "string", hint: "Controls the URL, e.g. /action-items/my-headline/. Changing this headline updates the page URL." }
      - { label: "Subheading", name: "subheading", widget: "string" }
      - label: "Display Image"
        name: "avatarImage"
        widget: "image"
        required: false
        choose_url: true
        hint: "Upload directly, pick from the media library, or paste an external image URL."
      - { label: "Display Image Description", name: "avatarAlt", widget: "string", required: false, hint: "Short accessibility description of the cover image (not the file path)." }
      - { label: "Body", name: "body", widget: "markdown", hint: "Use Add Component for Button or YouTube." }

  - name: "resourcesTabs"
    label: "Resources Tabs"
    folder: "src/content/resourcesTabs"
    create: true
    identifier_field: tabLabel
    slug: "{{slug}}"
    fields:
      - { label: "Tab Label", name: "tabLabel", widget: "string", hint: "Controls the resource URL, e.g. /resources/my-resource-name/. Changing this label updates the page URL." }
      - { label: "Order", name: "order", widget: "number", value_type: "int", min: 1, default: 1, required: false, hint: "Optional. Defaults to 1 (first). Use 2, 3, etc. to sort later items." }
      - { label: "Heading", name: "heading", widget: "string", required: false }
      - { label: "Subheading", name: "subheading", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown", hint: "Use Add Component for Button or YouTube." }

  - name: "blogPosts"
    label: "Blog Posts"
    folder: "src/content/blogPosts"
    create: true
    identifier_field: headline
    slug: "{{slug}}"
    fields:
      - { label: "Headline", name: "headline", widget: "string", hint: "Controls the URL, e.g. /on-the-ground/my-article-title/. Changing this headline updates the page URL." }
      - { label: "Subheading", name: "subheading", widget: "string", required: false }
      - { label: "Publish Date", name: "publishDate", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - label: "Display Image"
        name: "avatarImage"
        widget: "image"
        required: false
        choose_url: true
        hint: "Upload directly, pick from the media library, or paste an external image URL."
      - { label: "Display Image Description", name: "avatarAlt", widget: "string", required: false, hint: "Short accessibility description of the cover image (not the file path)." }
      - { label: "Body", name: "body", widget: "markdown", hint: "Use Add Component for Button or YouTube." }
